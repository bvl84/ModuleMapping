<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future State — Config Profile</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
  font-size: 13px;
  line-height: 1.5;
  color: #d4d4d4;
  background: #1e1e1e;
  padding: 20px;
}
.comment { color: #6a9955; }
.key { color: #9cdcfe; }
.str { color: #ce9178; }
.bool-true { color: #4ec9b0; }
.bool-false { color: #f44747; }
.num { color: #b5cea8; }
.bracket { color: #ffd700; }
.punct { color: #d4d4d4; }
.line { padding: 1px 0; white-space: pre; }
.indent-1 { padding-left: 24px; }
.indent-2 { padding-left: 48px; }
.indent-3 { padding-left: 72px; }
.indent-4 { padding-left: 96px; }
</style>
</head>
<body>
<div id="config-content"></div>
<script>

// From Confluence export "Future State Module Mapper".

      backgroundImage: "{1-6}",
      moduleName: "Module",
      entries: [
        {
          nameId: "Landing Page",
          display: true,
          sort: 0,
          details: {
            configuration: [
              { name: "OTP verification", display: true }
            ]
          }
        },
        {
          nameId: "Basic Information",
          display: true,

          }

        {

          sort: 2,

              { name: "Year built", display: true },
              { name: "Sq footage", display: true },
              { name: "# of systems", display: true },
              { name: "# of Beds", display: true },
              { name: "# of Baths", display: true }
            ]
          }

        {
          nameId: "Job Status",
          display: true,
          sort: 6
        }
      ]
    }
  ]

<script src="config-renderer.js"></script>
<script>renderConfig(DEFAULT_CONFIG, 'config-future-state');</script>

</html>
