<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenTech — Config Profile</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
  font-size: 13px;
  line-height: 1.5;
  color: #d4d4d4;
  background: #1e1e1e;
  padding: 20px;
}
.comment { color: #6a9955; }
.key { color: #9cdcfe; }
.str { color: #ce9178; }
.bool-true { color: #4ec9b0; }
.bool-false { color: #f44747; }
.num { color: #b5cea8; }
.bracket { color: #ffd700; }
.punct { color: #d4d4d4; }
.line { padding: 1px 0; white-space: pre; }
.indent-1 { padding-left: 24px; }
.indent-2 { padding-left: 48px; }
.indent-3 { padding-left: 72px; }
.indent-4 { padding-left: 96px; }
.collapsible { cursor: pointer; user-select: none; }
.collapsible:hover { background: #2a2d2e; }
.collapsible::before { content: '\25BC '; font-size: 10px; color: #858585; }
.collapsible.collapsed::before { content: '\25B6 '; }
.collapsible-content { overflow: hidden; }
.collapsible-content.hidden { display: none; }
</style>
</head>
<body>
<div id="config-content"></div>
<script>
var DEFAULT_CONFIG = {
  name: "NewWorkProposal",
  comments: ["GreenTech WF \u2014 Config Profile", "GreenTechRenewables"],
  sections: [
    {
      wfType: "WF",
      clientId: "{clientID}",
      bc: "GreenTechRenewables",
      backgroundImage: "{1-6}",
      moduleName: "Module",
      entries: [
        {
          nameId: "Contact Information", display: true, sort: 0,
          details: {
            Functions: ["Form Validation", "Contact Type (Homeowner/Property manager)", "Primary Contact Toggle", "Multi-Contact Support"],
            Fields: ["Contact Type", "First Name", "Last Name", "Email", "Phone", "Primary Contact"]
          }
        },
        {
          nameId: "Verify Home", display: true, sort: 1,
          details: {
            Functions: ["Manual Address Entry", "Zillow Verification", "Property Data Population", "Map Pin", "Occupied Toggle"],
            Fields: ["Address Line 1", "Address Line 2", "City", "State", "Zip", "Occupied"],
            Ext_Fields: ["Year Built", "Beds", "Baths", "Num Systems", "SqFt", "Map"]
          }
        },
        {
          nameId: "Additional Details", display: true, sort: 2,
          details: {
            Functions: ["System Selection (HP Standard, HP Cold Climate, Dual Fuel, Ductless)", "Conditional: Dual Fuel \u2192 AFUE", "Conditional: Ductless \u2192 Num Rooms", "Ductwork (Yes/No)"],
            Fields: ["New HVAC System", "Dual Fuel Efficiency", "Num Rooms", "Ductwork"]
          }
        },
        {
          nameId: "Summary", display: true, sort: 3,
          details: {
            Functions: ["Contacts Display (editable)", "Recommended System (AHRI#, carousel)", "Markup Pricing (Margin/Mark Up)", "Price Visibility Toggle", "Customer Notes", "Property Details (editable)"]
          }
        },
        { nameId: "Submission", display: true },
        { nameId: "Landing", display: true }
      ]
    },
    {
      wfType: "SJ",
      clientId: "{clientID}",
      bc: "GreenTechRenewables",
      backgroundImage: "{1-6}",
      moduleName: "Module",
      entries: [
        { nameId: "Landing", display: true, sort: 0 },
        {
          nameId: "Submitted Work Proposals", display: true, sort: 1,
          details: {
            Functions: ["Email Search", "Results Table", "Pagination"],
            Columns: ["Contact", "Property Address", "Submitted By", "Created On", "Total Price", "View"]
          }
        },
        {
          nameId: "View Proposal", display: true, sort: 2,
          details: {
            readOnly: true,
            Fields: ["Contacts", "Selected System", "Additional Details", "Price", "Customer Notes", "Property Details"]
          }
        }
      ]
    }
  ]
};
</script>
<script src="config-renderer.js"></script>
<script>renderConfig(DEFAULT_CONFIG, 'config-greentech');</script>
</body>
</html>
