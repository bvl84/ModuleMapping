<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solutions Builder — Config Profile</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
  font-size: 13px;
  line-height: 1.5;
  color: #d4d4d4;
  background: #1e1e1e;
  padding: 20px;
}
.comment { color: #6a9955; }
.key { color: #9cdcfe; }
.str { color: #ce9178; }
.bool-true { color: #4ec9b0; }
.bool-false { color: #f44747; }
.num { color: #b5cea8; }
.bracket { color: #ffd700; }
.punct { color: #d4d4d4; }
.line { padding: 1px 0; white-space: pre; }
.indent-1 { padding-left: 24px; }
.indent-2 { padding-left: 48px; }
.indent-3 { padding-left: 72px; }
.indent-4 { padding-left: 96px; }
.collapsible { cursor: pointer; user-select: none; }
.collapsible:hover { background: #2a2d2e; }
.collapsible::before { content: '\25BC '; font-size: 10px; color: #858585; }
.collapsible.collapsed::before { content: '\25B6 '; }
.collapsible-content { overflow: hidden; }
.collapsible-content.hidden { display: none; }
</style>
</head>
<body>
<div id="config-content"></div>
<script>
var DEFAULT_CONFIG = {
  name: "SolutionsBuilder",
  comments: ["Solutions Builder WF \u2014 Config Profile"],
  sections: [
    {
      wfType: "WF",
      clientId: "{clientID}",
      bc: "HomeComfort",
      backgroundImage: "{1-6}",
      moduleName: "Module",
      entries: [
        {
          nameId: "Contact", display: true, sort: 0,
          details: {
            Functions: ["Form Validation", "Input Masking (phone)", "Navigation (Next)"],
            Fields: ["First Name", "Last Name", "Email", "Phone Number"]
          }
        },
        {
          nameId: "Verify Home", display: true, sort: 1,
          details: {
            Functions: ["Address Autocomplete", "Address Verification (Zillow)", "Property Data Population", "Map Pin Display", "Occupied Toggle"],
            Fields: ["Property Address", "Property Occupied"],
            Ext_Fields: ["Year Built", "Square Footage", "Bedrooms", "Bathrooms", "Map"]
          }
        },
        {
          nameId: "Additional Details", display: true, sort: 2,
          details: {
            Functions: ["System Type Selection (Heat Pump, Ductless Room, Multi-Room Ductless, AC + Furnace)", "Efficiency Tier (Good/Best)", "SqFt Input", "Whole House Toggle", "System Rating Details (modal)"],
            Fields: ["Heating/Cooling SqFt", "Whole House", "System Type", "Efficiency Tier"]
          }
        },
        {
          nameId: "Summary", display: true, sort: 3,
          details: {
            Functions: ["PDF Generation (3-page)", "Email Delivery", "SFDC Web-to-Case", "Combine & Save (add-ons)"],
            Fields: ["Contacts", "Additional Details", "Customer Notes", "Recommend System", "Price", "Property Details"]
          }
        },
        { nameId: "Scheduling", display: false, sort: 4 },
        { nameId: "PDF", display: true },
        { nameId: "Email", display: true }
      ]
    }
  ]
};
</script>
<script src="config-renderer.js"></script>
<script>renderConfig(DEFAULT_CONFIG, 'config-solutions-builder');</script>
</body>
</html>
