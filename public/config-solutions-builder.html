<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solutions Builder — Config Profile</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
  font-size: 13px;
  line-height: 1.5;
  color: #d4d4d4;
  background: #1e1e1e;
  padding: 20px;
}
.comment { color: #6a9955; }
.key { color: #9cdcfe; }
.str { color: #ce9178; }
.bool-true { color: #4ec9b0; }
.bool-false { color: #f44747; }
.num { color: #b5cea8; }
.bracket { color: #ffd700; }
.punct { color: #d4d4d4; }
.line { padding: 1px 0; white-space: pre; }
.indent-1 { padding-left: 24px; }
.indent-2 { padding-left: 48px; }
.indent-3 { padding-left: 72px; }
.indent-4 { padding-left: 96px; }
</style>
</head>
<body>
<div id="config-content"></div>
<script>
var DEFAULT_CONFIG = {
  "meta title": "Find Your HVAC Upgrade | Daikin Solutions Builder",
  "meta description": "Answer a few questions about your home and get personalized heating and cooling recommendations. Compare Daikin heat pumps, furnaces, and ductless systems \u2014 no appointment needed.",
  sections: [
    {
      wfName: "Solutions Builder",
      wfType: "WF",
      clientId: "{clientID}",
      bc: "HomeComfort",
      backgroundImage: "{1-6}",
      moduleName: "Module",
      entries: [
        {
          nameId: "Basic Information", display: true, sort: 0,
          details: {
            Functions: ["Form Validation", "First Name", "Last Name", "Email", "Phone Number"]
          }
        },
        {
          nameId: "Property Details", display: true, sort: 1,
          details: {
            Functions: ["Address Autocomplete", "Address Verification (Smarty)", "Property Address", "Map Pin Display", "Occupied Toggle", "Year Built", "Square Footage", "Bedrooms", "Bathrooms"]
          }
        },
        {
          nameId: "System Upgrade", display: true, sort: 2,
          details: {
            Functions: ["System Type Selection", "Efficiency/Quality Tier", "SqFt Input", "Whole House Toggle"]
          }
        },
        {
          nameId: "Summary", display: true, sort: 3,
          details: {
            Functions: ["PDF Generation", "Email Delivery", "Restart", "Add-Ons", "Contact Information", "Property Details", "Recommend System"]
          }
        }
      ]
    }
  ]
};
</script>
<script src="config-renderer.js"></script>
<script>renderConfig(DEFAULT_CONFIG, 'config-solutions-builder');</script>
</body>
</html>
