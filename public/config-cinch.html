<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinch — Config Profile</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
  font-size: 13px;
  line-height: 1.5;
  color: #d4d4d4;
  background: #1e1e1e;
  padding: 20px;
}
.comment { color: #6a9955; }
.key { color: #9cdcfe; }
.str { color: #ce9178; }
.bool-true { color: #4ec9b0; }
.bool-false { color: #f44747; }
.num { color: #b5cea8; }
.bracket { color: #ffd700; }
.punct { color: #d4d4d4; }
.line { padding: 1px 0; white-space: pre; }
.indent-1 { padding-left: 24px; }
.indent-2 { padding-left: 48px; }
.indent-3 { padding-left: 72px; }
.indent-4 { padding-left: 96px; }
</style>
</head>
<body>
<div id="config-content"></div>
<script>
var DEFAULT_CONFIG = {
  "meta title": "Replace Your HVAC System | Cinch Home Services",
  "meta description": "Find your perfect HVAC replacement in minutes. See system matches, upfront pricing, and schedule a free in-home inspection \u2014 covered by your Cinch home warranty.",
  sections: [
    {
      wfName: "Cinch",
      wfType: "WF",
      clientId: "{clientID}",
      bc: "HomeWarranty",
      backgroundImage: "{1-6}",
      moduleName: "Module",
      entries: [
        {
          nameId: "Basic Information", display: true, sort: 0,
          details: {
            Functions: ["Form Validation", "Input Masking", "Email Verification (Cinch Identity)"],
            Fields: ["First Name", "Last Name", "Email", "Phone Number"]
          }
        },
        {
          nameId: "Property Details", display: true, sort: 1,
          details: {
            Functions: ["Address Autocomplete", "Zillow Verification", "Property Data Population", "Map Pin", "Occupied Toggle"],
            Fields: ["Property Address", "Property Occupied"],
            Ext_Fields: ["Year Built", "SqFt", "Num Systems", "Beds", "Baths", "Map"]
          }
        },
        {
          nameId: "HVAC Goals", display: true, sort: 2,
          details: {
            Functions: ["Goal Selection (pick 2 of 4)"],
            Options: ["Lower utility cost", "Modernize my system", "Better performance", "Improve air quality"]
          }
        },
        {
          nameId: "Current System", display: true, sort: 3,
          details: {
            Functions: ["SqFt Input", "Current System Selection", "Rating Selection (Good/Better/Best)", "Rating Details (modal)", "Ductwork (Yes/No)"],
            Fields: ["Heating/Cooling SqFt", "Current HVAC System", "New System Rating", "Ductwork Availability"]
          }
        },
        {
          nameId: "Your Match", display: true, sort: 4,
          details: {
            Functions: ["System Matching Engine", "Recommended System Display", "Price Breakdown", "Alternative Options", "Schedule Free Inspection"]
          }
        },
        {
          nameId: "Schedule Inspection", display: true, sort: 5,
          details: {
            Functions: ["Direct Scheduler", "Calendar (date + time slots)", "Job Creation"],
            Config: { jobType: "Inspection", estTime: "1hr", tz: "MDT" }
          },
          subModules: ["Support", "PDF", "Email", "Job Creation"]
        }
      ]
    },
    {
      wfName: "Cinch — Inspection",
      wfType: "WO",
      clientId: "{clientID}",
      bc: "HomeWarranty",
      backgroundImage: "{1-6}",
      moduleName: "Module_Inspection",
      entries: [
        { nameId: "Scheduling", display: true, sort: 0, actions: ["Reschedule"] },
        { nameId: "Scheduled", display: true, sort: 1, actions: ["Reschedule"] },
        { nameId: "In Process", display: true, sort: 2 },
        { nameId: "Inspection Completed", display: true, sort: 3 },
        { nameId: "Cancelled", display: true }
      ]
    },
    {
      wfName: "Cinch — Quote",
      wfType: "QO",
      clientId: "{clientID}",
      bc: "HomeWarranty",
      backgroundImage: "{1-6}",
      moduleName: "Module",
      entries: [
        { nameId: "Quote in Review", display: true, sort: 0 },
        {
          nameId: "Quote Ready for Approval", display: true, sort: 1,
          details: {
            actions: ["Approve Quote", "Reject Quote"],
            Fields: ["System cost", "Labor", "Shipping/Delivery", "Subtotal", "Estimated tax", "Grand Total"]
          }
        },
        { nameId: "Quote Approved", display: true, sort: 2 },
        { nameId: "Quote Declined", display: true },
        { nameId: "Quote Cancelled", display: true }
      ]
    },
    {
      wfName: "Cinch — Replacement",
      wfType: "WO",
      clientId: "{clientID}",
      bc: "HomeWarranty",
      backgroundImage: "{1-6}",
      moduleName: "Module_Replacement",
      entries: [
        { nameId: "Created", display: true, sort: 0, actions: ["Schedule Installation"] },
        { nameId: "Scheduling", display: true, sort: 1, actions: ["Reschedule"] },
        { nameId: "Scheduled", display: true, sort: 2, actions: ["Reschedule"] },
        { nameId: "In Process", display: true, sort: 3 },
        {
          nameId: "Completed", display: true, sort: 4,
          details: {
            Feedback: ["Installation quality", "Communication", "Timeliness", "Technician professionalism", "Value for cost"]
          }
        },
        { nameId: "Cancelled", display: true }
      ]
    }
  ]
};
</script>
<script src="config-renderer.js"></script>
<script>renderConfig(DEFAULT_CONFIG, 'config-cinch');</script>
</body>
</html>
